<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>沛宸 濾心保養追蹤</title>
<style>
:root {
  --bg: #f5f5f0; --surface: #fff; --border: rgba(0,0,0,0.1);
  --text: #1a1a1a; --text2: #666; --text3: #999;
  --accent: #1a1a1a; --danger: #d63031; --warning: #e17055;
  --success: #00b894; --info: #0984e3; --purple: #6c5ce7;
  --r: 12px; --rsm: 8px; --tabh: 60px;
  --safe: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root { --bg:#111; --surface:#1e1e1e; --border:rgba(255,255,255,0.1); --text:#f0f0f0; --text2:#aaa; --text3:#666; --accent:#f0f0f0; }
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif;color:var(--text);font-size:15px}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh}
#topbar{background:var(--surface);border-bottom:.5px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding-top:max(12px,env(safe-area-inset-top))}
#topbar h1{font-size:17px;font-weight:600}
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 16px calc(var(--tabh) + var(--safe) + 16px)}
#tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tabh) + var(--safe));background:var(--surface);border-top:.5px solid var(--border);display:flex;padding-bottom:var(--safe)}
.tabitem{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:var(--text3);border:none;background:none;cursor:pointer;padding:8px 0}
.tabitem.active{color:var(--accent)}
.tabitem svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.section{display:none}.section.active{display:block}
.card{background:var(--surface);border-radius:var(--r);border:.5px solid var(--border);padding:14px 16px;margin-bottom:10px}
.card-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat-box{background:var(--surface);border-radius:var(--rsm);border:.5px solid var(--border);padding:12px 8px;text-align:center}
.stat-num{font-size:26px;font-weight:600;line-height:1}
.stat-label{font-size:11px;color:var(--text2);margin-top:4px}
.c-danger{color:var(--danger)}.c-warning{color:var(--warning)}.c-purple{color:var(--purple)}
.month-label{font-size:12px;font-weight:600;color:var(--text2);margin:16px 0 8px;letter-spacing:.04em}
.client-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:.5px solid var(--border)}
.client-item:last-child{border-bottom:none}
.client-avatar{width:40px;height:40px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--text2);flex-shrink:0;border:.5px solid var(--border)}
.client-main{flex:1;min-width:0}
.client-name{font-size:15px;font-weight:500}
.client-sub{font-size:12px;color:var(--text2);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badges{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:11px;font-weight:500}
.badge-danger{background:rgba(214,48,49,.12);color:var(--danger)}
.badge-warning{background:rgba(225,112,85,.12);color:var(--warning)}
.badge-success{background:rgba(0,184,148,.12);color:var(--success)}
.badge-info{background:rgba(9,132,227,.12);color:var(--info)}
.badge-purple{background:rgba(108,92,231,.12);color:var(--purple)}
.badge-gray{background:var(--bg);color:var(--text2)}
/* 濾心道數標籤 */
.stage-row{margin-top:6px;display:flex;flex-direction:column;gap:3px}
.stage-item{display:flex;align-items:center;gap:6px;font-size:12px}
.stage-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-danger{background:var(--danger)}.dot-warning{background:var(--warning)}.dot-ok{background:var(--success)}
.action-col{display:flex;flex-direction:column;gap:6px;flex-shrink:0}
.btn-sm{padding:6px 10px;border-radius:var(--rsm);font-size:12px;border:.5px solid var(--border);background:var(--bg);color:var(--text);cursor:pointer;white-space:nowrap}
.btn-sm.primary-sm{background:rgba(9,132,227,.1);border-color:rgba(9,132,227,.3);color:var(--info)}
.btn-primary{width:100%;padding:14px;background:var(--accent);color:var(--surface);border:none;border-radius:var(--r);font-size:16px;font-weight:500;cursor:pointer;margin-top:12px}
.form-group{margin-bottom:14px}
label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
input[type=text],input[type=tel],input[type=date],select,textarea{width:100%;padding:11px 12px;border:.5px solid var(--border);border-radius:var(--rsm);font-size:15px;background:var(--bg);color:var(--text);appearance:none}
textarea{resize:vertical;min-height:70px;font-family:inherit}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.paste-box{font-family:'Menlo','Monaco',monospace;font-size:12px;line-height:1.6}
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{padding-left:36px}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3)}
.search-icon svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8}
.filter-row{display:flex;gap:8px;margin-bottom:12px;overflow-x:auto;padding-bottom:2px}
.chip{padding:6px 12px;border-radius:20px;font-size:13px;border:.5px solid var(--border);background:var(--surface);color:var(--text2);white-space:nowrap;cursor:pointer;flex-shrink:0}
.chip.active{background:var(--accent);color:var(--surface);border-color:var(--accent)}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.check-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:var(--rsm);border:.5px solid var(--border);background:var(--bg);cursor:pointer}
.check-item input{width:18px;height:18px;cursor:pointer;flex-shrink:0}
.check-item span{font-size:13px}
.result-item{display:flex;align-items:center;padding:12px 0;border-bottom:.5px solid var(--border);cursor:pointer;gap:10px}
.result-item:last-child{border-bottom:none}
.result-item:active{opacity:.6}
.selected-banner{background:rgba(9,132,227,.08);border:.5px solid rgba(9,132,227,.3);border-radius:var(--rsm);padding:10px 12px;margin-bottom:14px}
.selected-banner .sname{font-weight:600}
.selected-banner .ssub{font-size:12px;color:var(--text2);margin-top:3px}
.filter-info-box{background:var(--bg);border-radius:var(--rsm);padding:10px 12px;margin-bottom:14px;font-size:13px}
.filter-info-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:.5px solid var(--border)}
.filter-info-row:last-child{border-bottom:none}
.filter-info-label{color:var(--text2)}
.filter-info-due{font-weight:500}
.filter-info-due.od{color:var(--danger)}.filter-info-due.soon{color:var(--warning)}.filter-info-due.ok{color:var(--success)}
#toast{position:fixed;bottom:calc(var(--tabh) + var(--safe) + 12px);left:50%;transform:translateX(-50%);background:var(--text);color:var(--surface);padding:10px 18px;border-radius:20px;font-size:13px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center}
#toast.show{opacity:1}
.loading{text-align:center;color:var(--text3);padding:40px 0;font-size:14px}
.empty{text-align:center;color:var(--text3);padding:40px 0;font-size:14px}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>💧 濾心保養追蹤</h1>
    <span id="sync-status" style="font-size:12px;color:var(--text3)"></span>
  </div>
  <div id="content">

    <!-- 到期名單 -->
    <div id="sec-due" class="section active">
      <div class="stat-row">
        <div class="stat-box"><div class="stat-num c-danger" id="st-overdue">-</div><div class="stat-label">已逾期</div></div>
        <div class="stat-box"><div class="stat-num c-warning" id="st-month">-</div><div class="stat-label">本月到期</div></div>
        <div class="stat-box"><div class="stat-num" id="st-total">-</div><div class="stat-label">全部客戶</div></div>
      </div>
      <div class="filter-row" id="month-chips"></div>
      <div class="search-wrap">
        <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
        <input type="text" id="due-search" placeholder="搜尋姓名..." oninput="renderDue()">
      </div>
      <div id="due-list"><div class="loading">載入中...</div></div>
    </div>

    <!-- 新增客戶 -->
    <div id="sec-add" class="section">
      <div class="card">
        <div class="card-title">貼上資料（每行一項）</div>
        <div class="form-group">
          <textarea class="paste-box" id="paste-input" rows="6"
            placeholder="姓名&#10;電話&#10;地址&#10;安裝型號&#10;過濾設備&#10;安裝日期 (2024/05/10)"
            oninput="autoParse(this.value)"></textarea>
          <button class="btn-sm" onclick="clearPaste()" style="margin-top:6px">清除</button>
        </div>
      </div>
      <div class="card">
        <div class="card-title">客戶資料</div>
        <div class="form-row">
          <div class="form-group"><label>姓名 *</label><input type="text" id="f-name" placeholder="王小明"></div>
          <div class="form-group"><label>電話</label><input type="tel" id="f-phone" placeholder="0912-345-678"></div>
        </div>
        <div class="form-group"><label>地址</label><input type="text" id="f-addr" placeholder="台中北屯區..."></div>
        <div class="form-row">
          <div class="form-group"><label>安裝型號</label><input type="text" id="f-model" placeholder="AQ-3322 消光黑"></div>
          <div class="form-group"><label>過濾設備 *</label>
            <select id="f-filter" onchange="showFilterPreview()">
              <option value="">請選擇...</option>
              <option value="AQ-004">AQ-004</option>
              <option value="AQ-50-1">AQ-50-1</option>
              <option value="AQ-500C">AQ-500C</option>
              <option value="AQ-500A">AQ-500A</option>
              <option value="其他">其他</option>
            </select>
          </div>
        </div>
        <div id="filter-preview" style="display:none" class="filter-info-box">
          <div style="font-size:11px;color:var(--text2);margin-bottom:6px">此設備的更換週期：</div>
          <div id="filter-preview-content"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>安裝日期 *</label><input type="date" id="f-install" oninput="showFilterPreview()"></div>
          <div class="form-group"><label>地區</label>
            <select id="f-region">
              <option>北北基（宜蘭）</option><option>桃竹苗</option><option>中彰投</option>
              <option>雲嘉南</option><option>高屏</option><option>花東金門</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>備註</label><input type="text" id="f-note" placeholder="原客戶編號或備注"></div>
        <button class="btn-primary" onclick="addClient()">建立客戶資料</button>
      </div>
    </div>

    <!-- 更新保養 -->
    <div id="sec-update" class="section">
      <div class="card">
        <div class="card-title">搜尋客戶</div>
        <div class="search-wrap" style="margin-bottom:0">
          <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
          <input type="text" id="u-search" placeholder="姓名或電話..." oninput="searchUpdate()">
        </div>
        <div id="u-results"></div>
      </div>
      <div id="u-form" style="display:none">
        <div class="card" id="u-banner-card"></div>
        <div class="card">
          <div class="card-title">這次更換哪幾道？</div>
          <div class="form-group"><label>保養完成日期 *</label><input type="date" id="u-date"></div>
          <div class="form-group">
            <div class="check-grid" id="u-filter-checks">
              <!-- 動態根據客戶設備類型產生 -->
            </div>
          </div>
          <div class="form-group"><label>備註</label><input type="text" id="u-note" placeholder="例如：客戶反映水量偏小"></div>
          <button class="btn-primary" onclick="saveService()">儲存保養記錄</button>
        </div>
      </div>
    </div>

    <!-- 全部客戶 -->
    <div id="sec-all" class="section">
      <div class="search-wrap">
        <div class="search-icon"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div>
        <input type="text" id="all-search" placeholder="搜尋姓名..." oninput="renderAll()">
      </div>
      <div class="filter-row" id="region-chips">
        <div class="chip active" onclick="setRegion('')">全部</div>
        <div class="chip" onclick="setRegion('北北基')">北北基</div>
        <div class="chip" onclick="setRegion('桃竹苗')">桃竹苗</div>
        <div class="chip" onclick="setRegion('中彰投')">中彰投</div>
        <div class="chip" onclick="setRegion('雲嘉南')">雲嘉南</div>
        <div class="chip" onclick="setRegion('高屏')">高屏</div>
        <div class="chip" onclick="setRegion('花東')">花東</div>
      </div>
      <div id="all-list"><div class="loading">載入中...</div></div>
    </div>

  </div>
  <div id="tabbar">
    <button class="tabitem active" onclick="switchTab('due')">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>到期名單
    </button>
    <button class="tabitem" onclick="switchTab('add')">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>新增客戶
    </button>
    <button class="tabitem" onclick="switchTab('update')">
      <svg viewBox="0 0 24 24"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>更新保養
    </button>
    <button class="tabitem" onclick="switchTab('all')">
      <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>全部客戶
    </button>
  </div>
</div>
<div id="toast"></div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxTAImdR8Bv_OJuPuMcDVHDLioQJ7vTM2BUdSGVK2WJxWsOZkrwGYd_BnNOCBcNvixn/exec';

// 濾心規則（與後端同步）
const FILTER_RULES = {
  'AQ-004': [
    { name: '第1-3道 (PP/CTO/中空絲膜)', months: 6 },
    { name: '第4道 (中空絲膜)', months: 24 }
  ],
  'AQ-50-1': [
    { name: '第1-3道 (PP/CTO/後置碳)', months: 6 },
    { name: '第4道 (RO膜)', months: 24 },
    { name: '第5道 (後置碳)', months: 12 }
  ],
  'AQ-500C': [
    { name: '第1-3道 (PP/CTO/後置碳)', months: 6 },
    { name: '第4道 (RO膜)', months: 24 },
    { name: '第5道 (後置碳)', months: 12 }
  ],
  'AQ-500A': [
    { name: '第1-3道 (PP/CTO/後置碳)', months: 6 },
    { name: '第4道 (RO膜)', months: 24 },
    { name: '第5道 (後置碳)', months: 12 }
  ]
};

function getFilterRule(filterStr) {
  if (!filterStr) return null;
  const f = filterStr.toUpperCase();
  for (const key of Object.keys(FILTER_RULES)) {
    if (f.includes(key)) return { key, stages: FILTER_RULES[key] };
  }
  return null;
}

let allClients = [];
let selectedClient = null;
let activeMonth = '';
let activeRegion = '';

window.addEventListener('load', async () => {
  await loadClients();
  renderDue();
});

async function loadClients() {
  setSync('同步中...');
  try {
    const res = await fetch(`${API_URL}?action=getClients`);
    const data = await res.json();
    if (data.status === 'ok') { allClients = data.clients; setSync(''); }
    else setSync('同步失敗');
  } catch(e) { setSync('離線'); }
}

function setSync(msg) { document.getElementById('sync-status').textContent = msg; }

function switchTab(id) {
  document.querySelectorAll('.tabitem').forEach((t,i) => t.classList.toggle('active', ['due','add','update','all'][i]===id));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-'+id).classList.add('active');
  document.getElementById('content').scrollTo(0,0);
  if (id==='due') renderDue();
  if (id==='all') renderAll();
  if (id==='update') resetUpdateForm();
}

// ==============================
// 到期名單
// ==============================
function renderDue() {
  const today = todayStr();
  const search = document.getElementById('due-search').value.toLowerCase();

  // 統計：任一道逾期就算
  let overdue=0, thisMonth=0;
  allClients.forEach(c => {
    const dues = [c.due13, c.due4, c.due5].filter(Boolean);
    const earliest = dues.sort()[0];
    if (!earliest) return;
    if (earliest < today) overdue++;
    else if (earliest.slice(0,7) === today.slice(0,7)) thisMonth++;
  });
  document.getElementById('st-overdue').textContent = overdue;
  document.getElementById('st-month').textContent = thisMonth;
  document.getElementById('st-total').textContent = allClients.length;

  // 月份 chips：收集所有有到期日的月份
  const monthSet = new Set();
  allClients.forEach(c => {
    [c.due13, c.due4, c.due5].filter(Boolean).forEach(d => monthSet.add(d.slice(0,7)));
  });
  const months = [...monthSet].sort();
  document.getElementById('month-chips').innerHTML =
    `<div class="chip ${!activeMonth?'active':''}" onclick="setMonth('')">全部</div>` +
    months.map(m => `<div class="chip ${activeMonth===m?'active':''}" onclick="setMonth('${m}')">${m.slice(5)}月</div>`).join('');

  // 篩選：任一道在選擇月份內到期
  let filtered = allClients.filter(c => {
    const dues = [c.due13, c.due4, c.due5].filter(Boolean);
    if (!dues.length) return false;
    if (activeMonth && !dues.some(d => d.startsWith(activeMonth))) return false;
    if (search && !c.name.includes(search) && !(c.phone||'').includes(search)) return false;
    return true;
  }).sort((a,b) => {
    const ea = [a.due13,a.due4,a.due5].filter(Boolean).sort()[0]||'9999';
    const eb = [b.due13,b.due4,b.due5].filter(Boolean).sort()[0]||'9999';
    return ea>eb?1:-1;
  });

  // 分組
  const groups = {};
  filtered.forEach(c => {
    const dues = [c.due13,c.due4,c.due5].filter(Boolean).sort();
    const earliest = dues[0];
    const key = earliest < today ? '⚠️ 已逾期' : monthLabel(earliest);
    if (!groups[key]) groups[key] = [];
    groups[key].push(c);
  });

  const el = document.getElementById('due-list');
  if (!Object.keys(groups).length) { el.innerHTML='<div class="empty">目前沒有到期客戶</div>'; return; }

  el.innerHTML = Object.entries(groups).map(([grp, list]) => `
    <div class="month-label">${grp}（${list.length} 位）</div>
    <div class="card">${list.map(c => clientRowDue(c, today)).join('')}</div>
  `).join('');
}

function clientRowDue(c, today) {
  const stages = buildStageBadges(c, today);
  const notifyBadge = c.notifyCount > 0 ? `<span class="badge badge-info">通知 ${c.notifyCount} 次</span>` : '';
  const initials = c.name.slice(-2);
  return `
    <div class="client-item">
      <div class="client-avatar">${initials}</div>
      <div class="client-main">
        <div class="client-name">${c.name}</div>
        <div class="client-sub">${c.phone||''} ${c.region?'· '+c.region:''}</div>
        <div class="badges" style="margin-top:4px">
          ${notifyBadge}
          <span class="badge badge-gray">${c.filter||''}</span>
        </div>
        <div class="stage-row">${stages}</div>
      </div>
      <div class="action-col">
        <button class="btn-sm" onclick="quickNotify('${c.id}')">+通知</button>
        <button class="btn-sm primary-sm" onclick="quickService('${c.id}')">已保養</button>
      </div>
    </div>`;
}

function buildStageBadges(c, today) {
  const items = [];
  if (c.due13) items.push({ label: '第1-3道', due: c.due13 });
  if (c.has5th && c.due5) items.push({ label: '第5道', due: c.due5 });
  if (c.due4) items.push({ label: '第4道', due: c.due4 });

  return items.map(item => {
    const diff = daysDiff(today, item.due);
    let dotClass, text;
    if (diff < 0) {
      dotClass = 'dot-danger';
      text = `<span style="color:var(--danger)">${item.label} 逾期 ${Math.abs(diff)} 天（${item.due}）</span>`;
    } else if (diff <= 30) {
      dotClass = 'dot-warning';
      text = `<span style="color:var(--warning)">${item.label} 剩 ${diff} 天（${item.due}）</span>`;
    } else {
      dotClass = 'dot-ok';
      text = `<span style="color:var(--text2)">${item.label} ${item.due}</span>`;
    }
    return `<div class="stage-item"><div class="stage-dot ${dotClass}"></div>${text}</div>`;
  }).join('');
}

function setMonth(m) { activeMonth=m; renderDue(); }

async function quickNotify(id) {
  const c = allClients.find(x=>x.id===id);
  if (!c) return;
  try {
    const res = await post({ action:'addNotify', clientId:id });
    if (res.status==='ok') { c.notifyCount=res.notifyCount; toast(`已記錄通知 ${c.name}（第 ${c.notifyCount} 次）`); renderDue(); }
  } catch { toast('記錄失敗'); }
}

function quickService(id) {
  const c = allClients.find(x=>x.id===id);
  if (!c) return;
  selectedClient=c;
  switchTab('update');
  fillUpdateForm(c);
}

// ==============================
// 新增客戶
// ==============================
function showFilterPreview() {
  const filter = document.getElementById('f-filter').value;
  const install = document.getElementById('f-install').value;
  const box = document.getElementById('filter-preview');
  const content = document.getElementById('filter-preview-content');
  const rule = getFilterRule(filter);
  if (!rule || !install) { box.style.display='none'; return; }
  box.style.display='block';
  content.innerHTML = rule.stages.map(s => {
    const due = addMonthsJS(install, s.months);
    return `<div class="filter-info-row"><span class="filter-info-label">${s.name}</span><span class="filter-info-due ok">首次到期 ${due}</span></div>`;
  }).join('');
}

function autoParse(val) {
  const lines = val.trim().split('\n').map(l=>l.trim()).filter(Boolean);
  if (lines[0]) document.getElementById('f-name').value = lines[0];
  if (lines[1]) document.getElementById('f-phone').value = lines[1];
  if (lines[2]) document.getElementById('f-addr').value = lines[2];
  if (lines[3]) document.getElementById('f-model').value = lines[3];
  if (lines[4]) {
    const fv = lines[4].toUpperCase();
    const sel = document.getElementById('f-filter');
    for (const opt of sel.options) { if (fv.includes(opt.value)) { sel.value=opt.value; break; } }
  }
  if (lines[5]) document.getElementById('f-install').value = lines[5].replace(/\//g,'-').slice(0,10);
  showFilterPreview();
}

function clearPaste() {
  document.getElementById('paste-input').value='';
  ['f-name','f-phone','f-addr','f-model'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-install').value='';
  document.getElementById('f-filter').value='';
  document.getElementById('filter-preview').style.display='none';
}

async function addClient() {
  const name=document.getElementById('f-name').value.trim();
  const installDate=document.getElementById('f-install').value;
  const filter=document.getElementById('f-filter').value;
  if (!name||!installDate) { toast('請填寫姓名與安裝日期'); return; }
  const body = {
    action:'addClient', name, installDate, filter,
    phone:document.getElementById('f-phone').value.trim(),
    addr:document.getElementById('f-addr').value.trim(),
    model:document.getElementById('f-model').value.trim(),
    region:document.getElementById('f-region').value,
    note:document.getElementById('f-note').value.trim()
  };
  try {
    const res = await post(body);
    if (res.status==='ok') {
      let msg = `✓ ${name} 已建立`;
      if (res.due13) msg += `｜1-3道：${res.due13}`;
      if (res.due5)  msg += `｜5道：${res.due5}`;
      if (res.due4)  msg += `｜4道：${res.due4}`;
      toast(msg);
      clearPaste();
      document.getElementById('f-note').value='';
      await loadClients();
    } else toast('建立失敗：'+res.message);
  } catch { toast('網路錯誤'); }
}

// ==============================
// 更新保養
// ==============================
function resetUpdateForm() {
  selectedClient=null;
  document.getElementById('u-search').value='';
  document.getElementById('u-results').innerHTML='';
  document.getElementById('u-form').style.display='none';
}

function searchUpdate() {
  const q=document.getElementById('u-search').value.toLowerCase();
  if (!q) { document.getElementById('u-results').innerHTML=''; return; }
  const matches=allClients.filter(c=>c.name.toLowerCase().includes(q)||(c.phone||'').includes(q)).slice(0,6);
  document.getElementById('u-results').innerHTML = matches.length
    ? matches.map(c=>`
        <div class="result-item" onclick="fillUpdateForm(allClients.find(x=>x.id==='${c.id}'))">
          <div class="client-avatar" style="width:34px;height:34px;font-size:12px">${c.name.slice(-2)}</div>
          <div style="flex:1"><div style="font-weight:500">${c.name}</div>
          <div style="font-size:12px;color:var(--text2)">${c.phone||''} · ${c.region||''} · ${c.filter||''}</div></div>
          <svg width="16" height="16" stroke="var(--text3)" fill="none" stroke-width="2" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg>
        </div>`).join('')
    : '<div class="empty" style="padding:16px 0">找不到客戶</div>';
}

function fillUpdateForm(c) {
  if (!c) return;
  selectedClient=c;
  document.getElementById('u-results').innerHTML='';
  document.getElementById('u-search').value='';
  document.getElementById('u-date').value=todayStr();
  document.getElementById('u-note').value='';
  const today=todayStr();

  // 顯示各道到期狀態
  const rule = getFilterRule(c.filter);
  let stageInfo = '';
  if (c.due13) stageInfo += dueLine('第1-3道', c.due13, today);
  if (c.has5th && c.due5) stageInfo += dueLine('第5道', c.due5, today);
  if (c.due4) stageInfo += dueLine('第4道', c.due4, today);

  document.getElementById('u-banner-card').innerHTML = `
    <div class="selected-banner">
      <div class="sname">${c.name}</div>
      <div class="ssub">${c.phone||''} · ${c.model||''} · ${c.filter||''}</div>
      ${c.notifyCount>0 ? `<div style="margin-top:4px"><span class="badge badge-info">已通知 ${c.notifyCount} 次</span></div>` : ''}
    </div>
    <div class="filter-info-box">${stageInfo}</div>`;

  // 動態產生更換選項
  const checks = document.getElementById('u-filter-checks');
  const options = [{ val:'第1-3道', label:'第1-3道 (PP/CTO)' }];
  if (c.has5th) options.push({ val:'第5道', label:'第5道 (後置碳)' });
  options.push({ val:'第4道', label:'第4道 (RO膜/中空絲膜)' });
  options.push({ val:'全部更換', label:'全部更換' });
  checks.innerHTML = options.map(o =>
    `<label class="check-item"><input type="checkbox" value="${o.val}"><span>${o.label}</span></label>`
  ).join('');

  document.getElementById('u-form').style.display='block';
  document.getElementById('content').scrollTo(0,0);
}

function dueLine(label, due, today) {
  const diff = daysDiff(today, due);
  const cls = diff<0?'od':diff<=30?'soon':'ok';
  const txt = diff<0?`逾期 ${Math.abs(diff)} 天`:diff<=30?`剩 ${diff} 天`:`${due}`;
  return `<div class="filter-info-row">
    <span class="filter-info-label">${label}</span>
    <span class="filter-info-due ${cls}">${txt}（${due}）</span>
  </div>`;
}

async function saveService() {
  if (!selectedClient) return;
  const date=document.getElementById('u-date').value;
  if (!date) { toast('請填寫保養日期'); return; }
  const filters=[...document.querySelectorAll('#u-filter-checks input:checked')].map(cb=>cb.value);
  if (!filters.length) { toast('請勾選更換的濾心道數'); return; }
  const note=document.getElementById('u-note').value.trim();
  try {
    const res = await post({ action:'updateService', clientId:selectedClient.id, date, filters, note });
    if (res.status==='ok') {
      let msg = `✓ ${selectedClient.name} 已更新`;
      if (res.due13) msg += `｜1-3道：${res.due13}`;
      if (res.due5)  msg += `｜5道：${res.due5}`;
      if (res.due4)  msg += `｜4道：${res.due4}`;
      toast(msg);
      await loadClients();
      resetUpdateForm();
    } else toast('儲存失敗：'+res.message);
  } catch { toast('網路錯誤'); }
}

// ==============================
// 全部客戶
// ==============================
function setRegion(r) {
  activeRegion=r;
  document.querySelectorAll('#region-chips .chip').forEach(el => {
    el.classList.toggle('active', r===''?el.textContent==='全部':el.textContent.includes(r));
  });
  renderAll();
}

function renderAll() {
  const search=document.getElementById('all-search').value.toLowerCase();
  const today=todayStr();
  const filtered=allClients.filter(c => {
    if (search&&!c.name.includes(search)&&!(c.phone||'').includes(search)) return false;
    if (activeRegion&&!c.region.includes(activeRegion)) return false;
    return true;
  });
  const el=document.getElementById('all-list');
  if (!filtered.length) { el.innerHTML='<div class="empty">沒有客戶資料</div>'; return; }
  el.innerHTML='<div class="card">'+filtered.map(c => {
    const dues=[c.due13,c.due4,c.due5].filter(Boolean).sort();
    const earliest=dues[0];
    const isOverdue=earliest&&earliest<today;
    const badge=isOverdue?`<span class="badge badge-danger">已逾期</span>`:earliest?`<span class="badge badge-success">${earliest}</span>`:'';
    return `<div class="client-item">
      <div class="client-avatar" style="font-size:13px">${c.name.slice(-2)}</div>
      <div class="client-main">
        <div class="client-name">${c.name} <span style="font-size:12px;font-weight:400;color:var(--text2)">${c.region||''}</span></div>
        <div class="client-sub">${c.phone||''} · ${c.addr||''}</div>
        <div class="badges">${badge}<span class="badge badge-gray">${c.filter||''}</span></div>
      </div>
      <button class="btn-sm" onclick="quickService('${c.id}')">更新</button>
    </div>`;
  }).join('')+'</div>';
}

// ==============================
// 工具
// ==============================
function todayStr() {
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function daysDiff(a,b) { return Math.round((new Date(b)-new Date(a))/86400000); }
function monthLabel(s) { return s.slice(0,4)+'年'+parseInt(s.slice(5,7))+'月'; }
function addMonthsJS(dateStr,n) {
  const d=new Date(dateStr);
  d.setMonth(d.getMonth()+n);
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
async function post(body) {
  const res=await fetch(API_URL,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body) });
  return res.json();
}
function toast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3500);
}
</script>
